<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
    <title>Mia Tac Toe</title>
</head>
<body class="noise-background">

    <h1>Mia Tac Toe</h1>    

    <div class="wrapper">
        <div class="options">
            <button>O</button>
            <button>X</button>
        </div>
        <div class="grid">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>
        <div class="status">
            <p class="message">Play!</p>
            <p class="score">Score: 0</p>
        </div>
    </div>
</body>
</html>
